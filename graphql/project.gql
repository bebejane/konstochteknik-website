query AllProjects($first: IntType, $skip: IntType) {
	allProjects(
		first: $first
		skip: $skip
		orderBy: position_ASC
		filter: { AND: [{ thumbnail: { exists: true }, thumbnailMobile: { exists: true } }] }
	) {
		...ProjectFragment
	}
	_allProjectsMeta(
		filter: { AND: [{ thumbnail: { exists: true }, thumbnailMobile: { exists: true } }] }
	) {
		count
	}
}

query Project($slug: String!) {
	project(filter: { slug: { eq: $slug } }) {
		...ProjectFragment
	}
}

query ProjectById($id: ItemId!) {
	project(filter: { id: { eq: $id } }) {
		...ProjectFragment
	}
}

fragment ProjectFragment on ProjectRecord {
	position
	id
	title
	caption(markdown: false)
	captionStyle
	captionBlack
	category
	url
	color {
		...ColorFragment
	}
	background {
		...ColorFragment
	}
	thumbnail {
		...ImageThumbnailFragment
	}
	thumbnailMobile {
		...ImageThumbnailMobileFragment
	}
	award {
		...FileFragment
	}
	position
	slug
	slide {
		__typename
		... on VideoSlideRecord {
			id
			video {
				...VideoFragment
			}
			poster {
				...ImageFragment
			}
			backgroundImage {
				...ImageFragment
			}
			css
		}
		... on ImageSlideRecord {
			id
			images {
				__typename
				id
				... on ImageRecord {
					__typename
					image {
						...ImageFragment
					}
					layout
					background {
						...ColorFragment
					}
				}
			}
			backgroundImage {
				...ImageFragment
			}
			layout
			css
		}
	}
}
